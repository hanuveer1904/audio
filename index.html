<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Audio Library</title>

    <style>
        :root {
            --bg: #0f0f11;
            --card: #18181b;
            --accent: #3b82f6;
            --text: #e4e4e7;
            --muted: #a1a1aa;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px 100px;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #2a2a2e;
            background: #141417;
            color: white;
            width: 220px;
        }

        .sort-buttons button {
            background: #141417;
            border: 1px solid #2a2a2e;
            color: var(--muted);
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 5px;
            transition: 0.2s;
        }

        .sort-buttons button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .track {
            display: grid;
            grid-template-columns: 40px 1fr 50px 200px;
            align-items: center;
            padding: 14px 10px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .track:hover {
            background: var(--card);
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--accent);
        }

        .progress-container {
            height: 6px;
            background: #2a2a2e;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 6px;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 4px;
        }

        .time {
            font-size: 12px;
            color: var(--muted);
            text-align: right;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <h1>My Audio Library</h1>

        <div class="top-bar">
            <input type="text" id="search" class="search" placeholder="Search tracks...">
            <div class="sort-buttons">
                <button onclick="sortName()">🔤</button>
                <button onclick="sortDuration()">⏱</button>
            </div>
        </div>

        <div id="trackList"></div>
    </div>

    <script>
        const tracks = [
            { name: "Jurassic Park", file: "Jurassic Park.mp3", duration: 0 },
            { name: "Pirates of the Caribbean", file: "pirates.mp3", duration: 0 },
            { name: "Prologue", file: "prologue.mp3", duration: 0 },
            { name: "Beethoven 67", file: "beethoven 67.mp3", duration: 0 },
            { name: "Avengers", file: "avengers.mp3", duration: 0 },
            { name: "Some Random Song", file: "some random song.mp3", duration: 0 },
            { name: "The Good, Bad and Ugly", file: "thegoodbadandugly.mp3", duration: 0 },
            { name: "The Lion King", file: "lion.mp3", duration: 0 },
            { name: "GTA San Andreas", file: "GTA.mp3", duration: 0 },
            { name: "Some Good Song", file: "Luces rojas sobre la ciudad,.mp3", duration: 0 }
        ];

        let currentAudio = null;
        let currentButton = null;

        function formatTime(sec) {
            if (!sec || isNaN(sec)) return "0:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        function render() {
            const container = document.getElementById("trackList");
            container.innerHTML = "";

            const search = document.getElementById("search").value.toLowerCase();

            tracks
                .filter(t => t.name.toLowerCase().includes(search))
                .forEach((track, index) => {
                    const row = document.createElement("div");
                    row.className = "track";

                    row.innerHTML = `
            <div>${index + 1}</div>
            <div>${track.name}</div>
            <button class="icon-btn">▶</button>
            <div>
                <div class="progress-container">
                    <div class="progress"></div>
                </div>
                <div class="time">0:00 / 0:00</div>
            </div>
        `;

                    const audio = new Audio(track.file);
                    const btn = row.querySelector(".icon-btn");
                    const progress = row.querySelector(".progress");
                    const progressContainer = row.querySelector(".progress-container");
                    const timeDisplay = row.querySelector(".time");

                    audio.addEventListener("loadedmetadata", () => {
                        track.duration = audio.duration;
                        timeDisplay.textContent = "0:00 / " + formatTime(audio.duration);
                    });

                    btn.onclick = () => {
                        if (currentAudio && currentAudio !== audio) {
                            currentAudio.pause();
                            currentButton.textContent = "▶";
                        }

                        if (audio.paused) {
                            audio.play();
                            btn.textContent = "⏸";
                            currentAudio = audio;
                            currentButton = btn;
                        } else {
                            audio.pause();
                            btn.textContent = "▶";
                        }
                    };

                    audio.ontimeupdate = () => {
                        progress.style.width = (audio.currentTime / audio.duration) * 100 + "%";
                        timeDisplay.textContent =
                            formatTime(audio.currentTime) + " / " + formatTime(audio.duration);

                        localStorage.setItem("lastTrack", JSON.stringify({
                            file: track.file,
                            time: audio.currentTime
                        }));
                    };

                    progressContainer.onclick = (e) => {
                        const width = progressContainer.clientWidth;
                        audio.currentTime = (e.offsetX / width) * audio.duration;
                    };

                    container.appendChild(row);
                });
        }

        function sortName() {
            tracks.sort((a, b) => a.name.localeCompare(b.name));
            render();
        }

        function sortDuration() {
            tracks.sort((a, b) => a.duration - b.duration);
            render();
        }

        document.getElementById("search").addEventListener("input", render);

        window.onload = () => {
            const saved = localStorage.getItem("lastTrack");
            if (saved) {
                const data = JSON.parse(saved);
                if (confirm("Resume last track from " + formatTime(data.time) + "?")) {
                    const audio = new Audio(data.file);
                    audio.currentTime = data.time;
                    audio.play();
                }
            }
        };

        render();
    </script>

</body>


</html>
